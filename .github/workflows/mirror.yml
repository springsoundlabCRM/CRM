name: Mirror to GitVerse

on:
  #push:
  #  branches:
  #    - main

jobs:
  gitverse-mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitVerse
        run: |
          git remote add gitverse https://WEYTON:${{ secrets.GITVERSE_TOKEN }}@gitverse.ru/WEYTON/CRM.git
          git push --force gitverse main
