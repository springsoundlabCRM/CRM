/* ============================================================================
   DOMAIN HELPERS — vocal range / solfège
============================================================================ */

const SEMITONES: string[] = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const SOLFEGE: Record<string,string> = { C:'До', 'C#':'До#', D:'Ре', 'D#':'Ре#', E:'Ми', F:'Фа', 'F#':'Фа#', G:'Соль', 'G#':'Соль#', A:'Ля', 'A#':'Ля#', B:'Си' };

function noteIndex(note: string): number {
  const m = note.match(/^([A-G]#?)(\d)$/);
  if (!m) return 0;
  const [, s, oct] = m;
  return parseInt(oct, 10) * 12 + SEMITONES.indexOf(s);
}

function noteLabel(note: string): string {
  const m = note.match(/^([A-G]#?)(\d)$/);
  if (!m) return note;
  return `${SOLFEGE[m[1]]}${m[2]}`;
}

function buildNoteOptions(fromOct = 2, toOct = 6): string[] {
  const arr: string[] = [];
  for (let o = fromOct; o <= toOct; o++) {
    for (const s of SEMITONES) {
      if (o === toOct && s !== 'C') break;
      arr.push(s + o);
    }
  }
  return arr;
}
const NOTE_OPTIONS = buildNoteOptions(2, 6);

function rangeSemitones(low: string, high: string): number {
  return Math.max(0, noteIndex(high) - noteIndex(low));
}

const VOICE_TYPES = ['Сопрано','Меццо-сопрано','Контральто','Тенор','Баритон','Бас-баритон','Бас','Контратенор'] as const;

/* ============================================================================
   PIANO / VOCAL RANGE COMPONENT — signature piece
============================================================================ */

function buildKeyboardKeys(fromOct = 2, toOct = 6) {
  const whiteNotes = ['C','D','E','F','G','A','B'];
  const blackAfter: Record<string,string> = { C:'C#', D:'D#', F:'F#', G:'G#', A:'A#' };
  const keys: any[] = [];
  let whiteIndex = 0;
  for (let o = fromOct; o <= toOct - 1; o++) {
    for (const wn of whiteNotes) {
      keys.push({ note: wn + o, black: false, x: whiteIndex });
      if (blackAfter[wn]) keys.push({ note: blackAfter[wn] + o, black: true, x: whiteIndex });
      whiteIndex++;
    }
  }
  keys.push({ note: 'C' + toOct, black: false, x: whiteIndex });
  whiteIndex++;
  return { keys, totalWhite: whiteIndex };
}
const KEYBOARD_DATA = buildKeyboardKeys(2, 6);

function VoiceRangeKeyboard({ low, high, compact = false }: { low: string; high: string; compact?: boolean }) {
  const KEY_W = compact ? 9 : 13;
  const KEY_H = compact ? 46 : 68;
  const BLACK_W = KEY_W * 0.62;
  const BLACK_H = KEY_H * 0.62;
  const width = KEYBOARD_DATA.totalWhite * KEY_W;
  const lowI = noteIndex(low), highI = noteIndex(high);
  const inRange = (n: string) => { const i = noteIndex(n); return i >= lowI && i <= highI; };

  const whites = KEYBOARD_DATA.keys.filter(k => !k.black);
  const blacks = KEYBOARD_DATA.keys.filter(k => k.black);

  return (
    <div className="overflow-x-auto no-scrollbar rounded-lg border border-ink-200 bg-white">
      <svg width={width} height={KEY_H + (compact?0:2)} viewBox={`0 0 ${width} ${KEY_H}`} className="block">
        {whites.map((k) => {
          const active = inRange(k.note);
          return (
            <rect key={k.note} x={k.x*KEY_W} y={0} width={KEY_W-1} height={KEY_H} rx={2}
              fill={active ? '#eae6fb' : '#ffffff'} stroke={active ? '#8a7bea' : '#e3dfe9'} strokeWidth={active?1.4:1}
              data-key-highlight="1" />
          );
        })}
        {blacks.map((k) => {
          const active = inRange(k.note);
          return (
            <rect key={k.note} x={(k.x+1)*KEY_W - BLACK_W/2} y={0} width={BLACK_W} height={BLACK_H} rx={1.5}
              fill={active ? '#5b46c9' : '#211f2b'} data-key-highlight="1" />
          );
        })}
      </svg>
    </div>
  );
}

        <div className="w-7 h-7 rounded-lg bg-violet-100 text-violet-600 flex items-center justify-center">{icon}</div>
      </div>
      <div className="text-2xl font-semibold text-ink-900 tabular-nums">{value}</div>
      {sub && <div className="text-xs text-ink-500">{sub}</div>}
    </div>
  );
}

/* ============================================================================
   MAIN APP
============================================================================ */

function App() {
  const [data, setData] = useState(() => loadState());
  const { students, lessons, payments } = data;
  useEffect(() => { saveState(data); }, [data]);

  const [view, setView] = useState<'dashboard'|'students'|'pipeline'|'schedule'|'payments'>('dashboard');
  const [query, setQuery] = useState('');
  const [filterVoice, setFilterVoice] = useState('Все');
  const [filterStage, setFilterStage] = useState('Все');
  const [selectedId, setSelectedId] = useState<string|null>(null);
  const [modal, setModal] = useState<null | { mode:'add'|'edit'; student?: Student }>(null);
  const [toast, setToast] = useState<string|null>(null);

  const showToast = useCallback((msg: string) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  }, []);

  function updateStudents(fn: (arr: Student[]) => Student[]) {
    setData((d:any) => ({ ...d, students: fn(d.students) }));
  }
  function updateLessons(fn: (arr: Lesson[]) => Lesson[]) {
    setData((d:any) => ({ ...d, lessons: fn(d.lessons) }));
  }
  function updatePayments(fn: (arr: Payment[]) => Payment[]) {
    setData((d:any) => ({ ...d, payments: fn(d.payments) }));
  }

  function saveStudent(st: Student, isNew: boolean) {
    updateStudents(arr => isNew ? [st, ...arr] : arr.map(s => s.id===st.id ? st : s));
    showToast(isNew ? 'Ученик добавлен' : 'Изменения сохранены');
    setModal(null);
  }
  function deleteStudent(id: string) {
    updateStudents(arr => arr.filter(s => s.id !== id));
    updateLessons(arr => arr.filter(l => l.studentId !== id));
    updatePayments(arr => arr.filter(p => p.studentId !== id));
    setSelectedId(null);
    showToast('Ученик удалён');
  }
  function moveStage(id: string, stage: Stage) {
    updateStudents(arr => arr.map(s => s.id===id ? { ...s, stage } : s));
  }
  function addLesson(l: Lesson) {
    updateLessons(arr => [l, ...arr]);
    showToast('Занятие запланировано');
  }
  function setLessonStatus(id: string, status: Lesson['status']) {
    updateLessons(arr => arr.map(l => l.id===id ? { ...l, status } : l));
  }
  function addPayment(p: Payment) {
    updatePayments(arr => [p, ...arr]);
    updateStudents(arr => arr.map(s => s.id===p.studentId ? { ...s, balance: s.balance + p.amount } : s));
    showToast('Оплата зафиксирована');
  }

  const filteredStudents = useMemo(() => {
    return students.filter((s: Student) => {
      if (query && !s.name.toLowerCase().includes(query.toLowerCase())) return false;
      if (filterVoice !== 'Все' && s.voiceType !== filterVoice) return false;
      if (filterStage !== 'Все' && s.stage !== filterStage) return false;
      return true;
    });
  }, [students, query, filterVoice, filterStage]);

  const selectedStudent = students.find((s: Student) => s.id === selectedId) || null;

  const NAV = [
    { id:'dashboard', label:'Дашборд', icon: IconDashboard },
    { id:'students', label:'Ученики', icon: IconUsers },
    { id:'pipeline', label:'Воронка', icon: IconFunnel },
    { id:'schedule', label:'Расписание', icon: IconCalendar },
    { id:'payments', label:'Оплаты', icon: IconWallet },
  ] as const;

  return (
    <div className="flex h-screen w-screen overflow-hidden bg-ink-50">
      {/* SIDEBAR */}
      <aside className="w-60 shrink-0 bg-white border-r border-ink-100 flex flex-col">
        <div className="h-16 flex items-center gap-2.5 px-5 border-b border-ink-100">
          <div className="w-8 h-8 rounded-lg bg-violet-600 flex items-center justify-center text-white">
            <IconMic className="w-[18px] h-[18px]" strokeWidth={2} />
          </div>
          <div>
            <div className="font-serif font-semibold text-[15px] leading-none text-ink-900">Solfa</div>
            <div className="text-[11px] text-ink-400 mt-0.5">студия вокала</div>
          </div>
        </div>

        <nav className="flex-1 px-3 py-4 space-y-0.5">
          {NAV.map(n => {
            const active = view === n.id;
            const NIcon = n.icon;
            return (
              <button key={n.id} onClick={() => { setView(n.id); setSelectedId(null); }}
                className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-lg text-sm font-medium transition-colors
                  ${active ? 'bg-violet-100 text-violet-700' : 'text-ink-600 hover:bg-ink-50 hover:text-ink-800'}`}>
                <NIcon className="w-4 h-4" strokeWidth={active?2.1:1.8} />
                {n.label}
              </button>
            );
          })}
        </nav>

        <div className="p-3 border-t border-ink-100">
          <div className="flex items-center gap-2.5 px-2 py-2 rounded-lg hover:bg-ink-50 cursor-pointer">
            <Avatar name="Ольга Реброва" size={30} />
            <div className="min-w-0">
              <div className="text-sm font-medium text-ink-800 truncate">Ольга Реброва</div>
              <div className="text-[11px] text-ink-400 truncate">педагог по вокалу</div>
            </div>
          </div>
        </div>
      </aside>

      {/* MAIN */}
      <div className="flex-1 flex flex-col min-w-0">
        {/* TOPBAR */}
        <header className="h-16 shrink-0 border-b border-ink-100 bg-white/80 backdrop-blur flex items-center gap-3 px-6">
          <div className="relative flex-1 max-w-sm">
            <IconSearch className="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-ink-400" />
            <input value={query} onChange={e=>setQuery(e.target.value)} placeholder="Поиск учеников..."
              className="w-full pl-9 pr-3 py-2 rounded-lg bg-ink-50 border border-transparent text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 focus:bg-white focus:border-violet-300 transition" />
          </div>
          <div className="flex-1" />
          <button onClick={() => setModal({ mode:'add' })}
            className="inline-flex items-center gap-1.5 bg-violet-600 hover:bg-violet-700 text-white text-sm font-medium px-3.5 py-2 rounded-lg shadow-sm transition-colors">
            <IconPlus className="w-4 h-4" strokeWidth={2.2} />
            Добавить ученика
          </button>
        </header>

        {/* CONTENT */}
        <main className="flex-1 overflow-y-auto">
          {view === 'dashboard' && (
            <Dashboard students={students} lessons={lessons} payments={payments}
              onOpenStudent={(id:string) => { setView('students'); setSelectedId(id); }}
              onGoto={setView} />
          )}
          {view === 'students' && (
            <StudentsView students={filteredStudents} allCount={students.length}
              query={query} setQuery={setQuery}
              filterVoice={filterVoice} setFilterVoice={setFilterVoice}
              filterStage={filterStage} setFilterStage={setFilterStage}
              onSelect={setSelectedId} />
          )}
          {view === 'pipeline' && (
            <PipelineView students={students} onMove={moveStage} onSelect={setSelectedId} />
          )}
          {view === 'schedule' && (
            <ScheduleView lessons={lessons} students={students}
              onAddLesson={() => setModal({ mode:'add' } as any)}
              onSetStatus={setLessonStatus}
              onSelectStudent={setSelectedId} />
          )}
          {view === 'payments' && (
            <PaymentsView payments={payments} students={students} onSelectStudent={setSelectedId} />
          )}
        </main>
      </div>

      {/* STUDENT DETAIL DRAWER */}
      {selectedStudent && (
        <StudentDrawer student={selectedStudent} lessons={lessons.filter((l:Lesson)=>l.studentId===selectedStudent.id)}
          payments={payments.filter((p:Payment)=>p.studentId===selectedStudent.id)}
          onClose={() => setSelectedId(null)}
          onEdit={() => setModal({ mode:'edit', student: selectedStudent })}
          onDelete={() => deleteStudent(selectedStudent.id)}
          onAddLesson={addLesson}
          onAddPayment={addPayment}
          onMoveStage={(stage:Stage) => moveStage(selectedStudent.id, stage)}
        />
      )}

      {/* ADD/EDIT MODAL */}
      {modal && (
        <StudentModal mode={modal.mode} student={modal.student}
          onClose={() => setModal(null)}
          onSave={saveStudent} />
      )}

      {/* TOAST */}
      {toast && (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-ink-900 text-white text-sm font-medium px-4 py-2.5 rounded-lg shadow-pop anim-pop flex items-center gap-2 z-[100]">
          <IconCheck className="w-4 h-4 text-emerald-400" strokeWidth={2.4} />
          {toast}
        </div>
      )}
    </div>
  );
}

/* ============================================================================
   DASHBOARD
============================================================================ */

function Dashboard({ students, lessons, payments, onOpenStudent, onGoto }: any) {
  const active = students.filter((s:Student) => s.stage==='active').length;
  const now = new Date();
  const monthRevenue = payments.filter((p:Payment) => {
    const d = new Date(p.date); return d.getMonth()===now.getMonth() && d.getFullYear()===now.getFullYear() && p.status==='Оплачено';
  }).reduce((sum:number,p:Payment)=>sum+p.amount,0);
  const weekAhead = lessons.filter((l:Lesson) => {
    const d = new Date(l.date); const diff = (d.getTime()-now.getTime())/86400000;
    return diff >= -0.5 && diff <= 7 && l.status==='Запланировано';
  }).length;
  const conducted = lessons.filter((l:Lesson)=>l.status==='Проведено').length;
  const cancelled = lessons.filter((l:Lesson)=>l.status==='Отменено').length;
  const attendance = conducted+cancelled>0 ? Math.round(100*conducted/(conducted+cancelled)) : 100;

  const upcoming = lessons
    .filter((l:Lesson) => l.status==='Запланировано' && new Date(l.date).getTime() >= new Date().setHours(0,0,0,0))
    .sort((a:Lesson,b:Lesson) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time))
    .slice(0,6);

  const owing = students.filter((s:Student) => s.balance < 0).sort((a:Student,b:Student)=>a.balance-b.balance).slice(0,5);

  const months = Array.from({length:6}).map((_,i) => {
    const d = new Date(); d.setMonth(d.getMonth() - (5-i));
    const revenue = payments.filter((p:Payment) => {
      const pd = new Date(p.date); return pd.getMonth()===d.getMonth() && pd.getFullYear()===d.getFullYear() && p.status==='Оплачено';
    }).reduce((sum:number,p:Payment)=>sum+p.amount,0);
    return { label: d.toLocaleDateString('ru-RU',{month:'short'}), revenue };
  });
  const maxRev = Math.max(...months.map(m=>m.revenue), 1);

  const stageCounts = STAGES.map(st => ({ ...st, count: students.filter((s:Student)=>s.stage===st.id).length }));

  return (
    <div className="p-6 max-w-7xl mx-auto anim-fade space-y-6">
      <div>
        <h1 className="text-xl font-semibold text-ink-900 font-serif">Доброе утро, Ольга</h1>
        <p className="text-sm text-ink-500 mt-0.5">Вот что происходит в вашей студии сегодня, {fmtDateFull(new Date().toISOString())}.</p>
      </div>

      <div className="grid grid-cols-4 gap-4">
        <StatCard label="Активные ученики" value={active} sub={`${students.length} всего в базе`} icon={<IconUsers className="w-4 h-4"/>} />
        <StatCard label="Доход за месяц" value={fmtMoney(monthRevenue)} sub="оплаченные занятия" icon={<IconWallet className="w-4 h-4"/>} />
        <StatCard label="Занятий за 7 дней" value={weekAhead} sub="запланировано" icon={<IconCalendar className="w-4 h-4"/>} />
        <StatCard label="Посещаемость" value={`${attendance}%`} sub="от проведённых занятий" icon={<IconSparkle className="w-4 h-4"/>} />
      </div>

      <div className="grid grid-cols-3 gap-5">
        {/* Upcoming lessons */}
        <div className="col-span-2 bg-white rounded-xl2 border border-ink-100 shadow-card">
          <div className="flex items-center justify-between px-5 py-4 border-b border-ink-100">
            <h2 className="text-sm font-semibold text-ink-800">Ближайшие занятия</h2>
            <button onClick={()=>onGoto('schedule')} className="text-xs font-medium text-violet-600 hover:text-violet-700 flex items-center gap-0.5">
              Всё расписание <IconChevronRight className="w-3.5 h-3.5"/>
            </button>
          </div>
          <div className="divide-y divide-ink-100">
            {upcoming.length === 0 && <div className="px-5 py-8 text-center text-sm text-ink-400">Занятий не запланировано</div>}
            {upcoming.map((l:Lesson) => {
              const st = students.find((s:Student)=>s.id===l.studentId);
              if (!st) return null;
              return (
                <div key={l.id} onClick={()=>onOpenStudent(st.id)} className="flex items-center gap-3 px-5 py-3 hover:bg-ink-50 cursor-pointer transition-colors">
                  <Avatar name={st.name} size={34} />
                  <div className="min-w-0 flex-1">
                    <div className="text-sm font-medium text-ink-800 truncate">{st.name}</div>
                    <div className="text-xs text-ink-500 truncate">{l.topic} · {l.type}</div>
                  </div>
                  <div className="text-right shrink-0">
                    <div className="text-sm font-medium text-ink-800 tabular-nums">{l.time}</div>
                    <div className="text-xs text-ink-400 capitalize">{weekday(l.date)}, {fmtDate(l.date)}</div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Pipeline mini + owing */}
        <div className="space-y-5">
          <div className="bg-white rounded-xl2 border border-ink-100 shadow-card p-5">
            <h2 className="text-sm font-semibold text-ink-800 mb-3.5">Воронка учеников</h2>
            <div className="space-y-2.5">
              {stageCounts.map(sc => (
                <div key={sc.id} onClick={()=>onGoto('pipeline')} className="cursor-pointer">
                  <div className="flex items-center justify-between text-xs mb-1">
                    <span className="text-ink-600 font-medium">{sc.label}</span>
                    <span className="text-ink-400 tabular-nums">{sc.count}</span>
                  </div>
                  <div className="h-1.5 rounded-full bg-ink-100 overflow-hidden">
                    <div className="h-full bg-violet-500 rounded-full transition-all" style={{ width: `${students.length ? (sc.count/students.length*100) : 0}%` }} />
                  </div>
                </div>
              ))}
            </div>
          </div>

          <div className="bg-white rounded-xl2 border border-ink-100 shadow-card p-5">
            <h2 className="text-sm font-semibold text-ink-800 mb-3">Ожидают оплаты</h2>
            {owing.length === 0 && <div className="text-sm text-ink-400">Все ученики рассчитались ✓</div>}
            <div className="space-y-2.5">
              {owing.map((s:Student) => (
                <div key={s.id} onClick={()=>onOpenStudent(s.id)} className="flex items-center gap-2.5 cursor-pointer hover:bg-ink-50 -mx-2 px-2 py-1 rounded-lg">
                  <Avatar name={s.name} size={26} />
                  <span className="text-sm text-ink-700 flex-1 truncate">{s.name}</span>
                  <span className="text-xs font-semibold text-rose-600 tabular-nums">{fmtMoney(Math.abs(s.balance))}</span>
                </div>
              ))}
            </div>
          </div>
        </div>
      </div>

      {/* revenue chart */}
      <div className="bg-white rounded-xl2 border border-ink-100 shadow-card p-5">
        <h2 className="text-sm font-semibold text-ink-800 mb-4">Доход за последние 6 месяцев</h2>
        <div className="flex items-end gap-4 h-40">
          {months.map((m,i) => (
            <div key={i} className="flex-1 flex flex-col items-center gap-2 h-full justify-end">
              <div className="text-[11px] text-ink-500 tabular-nums font-medium">{m.revenue>0 ? fmtMoney(m.revenue) : ''}</div>
              <div className="w-full rounded-t-md bg-violet-500/85 hover:bg-violet-600 transition-colors" style={{ height: `${Math.max(4, m.revenue/maxRev*100)}%` }} />
              <div className="text-xs text-ink-400 capitalize">{m.label}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function PipelineView({ students, onMove, onSelect }: any) {
  const [dragId, setDragId] = useState<string|null>(null);
  const [overStage, setOverStage] = useState<string|null>(null);

  return (
    <div className="p-6 max-w-7xl mx-auto anim-fade">
      <h1 className="text-xl font-semibold text-ink-900 font-serif mb-0.5">Воронка учеников</h1>
      <p className="text-sm text-ink-500 mb-5">Перетаскивайте карточки между этапами</p>

      <div className="grid grid-cols-4 gap-4 items-start">
        {STAGES.map(stage => {
          const items = students.filter((s:Student) => s.stage === stage.id);
          const isOver = overStage === stage.id;
          return (
            <div key={stage.id}
              onDragOver={(e)=>{ e.preventDefault(); setOverStage(stage.id); }}
              onDragLeave={()=> setOverStage(cur => cur===stage.id ? null : cur)}
              onDrop={(e)=>{ e.preventDefault(); if (dragId) onMove(dragId, stage.id); setDragId(null); setOverStage(null); }}
              className={`rounded-xl2 p-3 min-h-[420px] transition-colors ${isOver ? 'bg-violet-100/70 ring-2 ring-violet-300' : 'bg-ink-100/60'}`}>
              <div className="flex items-center justify-between px-1 mb-3">
                <span className="text-xs font-semibold text-ink-600 uppercase tracking-wide">{stage.label}</span>
                <span className="text-xs text-ink-400 bg-white rounded-full w-5 h-5 flex items-center justify-center border border-ink-200">{items.length}</span>
              </div>
              <div className="space-y-2.5">
                {items.map((s: Student) => (
                  <div key={s.id} draggable
                    onDragStart={()=>setDragId(s.id)}
                    onDragEnd={()=>{setDragId(null); setOverStage(null);}}
                    onClick={()=>onSelect(s.id)}
                    className="bg-white rounded-lg border border-ink-100 shadow-card p-3 cursor-grab active:cursor-grabbing hover:shadow-pop transition-shadow">
                    <div className="flex items-center gap-2 mb-2">
                      <Avatar name={s.name} size={26} />
                      <span className="text-sm font-medium text-ink-800 truncate">{s.name}</span>
                    </div>
                    <div className="flex items-center gap-1.5 flex-wrap">
                      <Badge tone="violet">{s.voiceType}</Badge>
                      <Badge>{s.level}</Badge>
                    </div>
                  </div>
                ))}
                {items.length === 0 && <div className="text-xs text-ink-400 text-center py-6">Пусто</div>}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function ScheduleView({ lessons, students, onSetStatus, onSelectStudent }: any) {
  const days = Array.from({length:10}).map((_,i) => isoPlusDays(i).slice(0,10));
  const byDay = days.map(day => ({
    day,
    items: lessons.filter((l:Lesson) => l.date.slice(0,10) === day)
      .sort((a:Lesson,b:Lesson)=>a.time.localeCompare(b.time)),
  }));

  return (
    <div className="p-6 max-w-4xl mx-auto anim-fade">
      <h1 className="text-xl font-semibold text-ink-900 font-serif mb-0.5">Расписание</h1>
      <p className="text-sm text-ink-500 mb-5">Ближайшие 10 дней</p>

      <div className="space-y-5">
        {byDay.map(({ day, items }) => (
          <div key={day}>
            <div className="flex items-center gap-2 mb-2">
              <span className="text-sm font-semibold text-ink-800 capitalize">{weekday(day)}, {fmtDate(day)}</span>
              {items.length>0 && <span className="text-xs text-ink-400">{items.length} занятие(й)</span>}
            </div>
            {items.length === 0 ? (
              <div className="text-xs text-ink-400 pl-1 pb-1">Занятий нет</div>
            ) : (
              <div className="bg-white rounded-xl2 border border-ink-100 shadow-card divide-y divide-ink-100">
                {items.map((l:Lesson) => {
                  const st = students.find((s:Student)=>s.id===l.studentId);
                  if (!st) return null;
                  const statusTone = l.status==='Проведено' ? 'green' : l.status==='Отменено' ? 'red' : 'violet';
                  return (
                    <div key={l.id} className="flex items-center gap-3 px-4 py-3">
                      <div className="w-14 shrink-0 text-sm font-medium text-ink-700 tabular-nums flex items-center gap-1">
                        <IconClock className="w-3.5 h-3.5 text-ink-400" />{l.time}
                      </div>
                      <Avatar name={st.name} size={28} />
                      <div className="min-w-0 flex-1 cursor-pointer" onClick={()=>onSelectStudent(st.id)}>
                        <div className="text-sm font-medium text-ink-800 truncate">{st.name}</div>
                        <div className="text-xs text-ink-500 truncate">{l.topic} · {l.duration} мин · {l.type}</div>
                      </div>
                      <Badge tone={statusTone}>{l.status}</Badge>
                      {l.status==='Запланировано' && (
                        <div className="flex items-center gap-1 shrink-0">
                          <button onClick={()=>onSetStatus(l.id,'Проведено')} title="Отметить проведённым"
                            className="w-7 h-7 rounded-md border border-ink-200 hover:bg-emerald-50 hover:border-emerald-300 flex items-center justify-center text-ink-500 hover:text-emerald-600 transition-colors">
                            <IconCheck className="w-3.5 h-3.5" strokeWidth={2.2}/>
                          </button>
                          <button onClick={()=>onSetStatus(l.id,'Отменено')} title="Отменить"
                            className="w-7 h-7 rounded-md border border-ink-200 hover:bg-rose-50 hover:border-rose-300 flex items-center justify-center text-ink-500 hover:text-rose-600 transition-colors">
                            <IconX className="w-3.5 h-3.5" strokeWidth={2.2}/>
                          </button>
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        ))}
      </div>
    </div>
  );
}

function PaymentsView({ payments, students, onSelectStudent }: any) {
  const sorted = [...payments].sort((a:Payment,b:Payment)=>b.date.localeCompare(a.date));
  const totalPaid = payments.filter((p:Payment)=>p.status==='Оплачено').reduce((s:number,p:Payment)=>s+p.amount,0);
  const totalPending = payments.filter((p:Payment)=>p.status!=='Оплачено').reduce((s:number,p:Payment)=>s+p.amount,0);

  return (
    <div className="p-6 max-w-6xl mx-auto anim-fade">
      <h1 className="text-xl font-semibold text-ink-900 font-serif mb-0.5">Оплаты</h1>
      <p className="text-sm text-ink-500 mb-5">История платежей учеников</p>

      <div className="grid grid-cols-3 gap-4 mb-5">
        <StatCard label="Получено" value={fmtMoney(totalPaid)} sub="все время" icon={<IconWallet className="w-4 h-4"/>} />
        <StatCard label="Ожидает / просрочено" value={fmtMoney(totalPending)} sub="требует внимания" icon={<IconClock className="w-4 h-4"/>} />
        <StatCard label="Всего платежей" value={payments.length} sub="записей" icon={<IconMusic className="w-4 h-4"/>} />
      </div>

      <div className="bg-white rounded-xl2 border border-ink-100 shadow-card overflow-hidden">
        <table className="w-full text-sm">
          <thead>
            <tr className="border-b border-ink-100 text-left text-xs text-ink-400 uppercase tracking-wide">
              <th className="px-5 py-3 font-medium">Ученик</th>
              <th className="px-4 py-3 font-medium">Дата</th>
              <th className="px-4 py-3 font-medium">Способ</th>
              <th className="px-4 py-3 font-medium">Статус</th>
              <th className="px-5 py-3 font-medium text-right">Сумма</th>
            </tr>
          </thead>
          <tbody>
            {sorted.map((p: Payment) => {
              const st = students.find((s:Student)=>s.id===p.studentId);
              const tone = p.status==='Оплачено' ? 'green' : p.status==='Ожидает' ? 'amber' : 'red';
              return (
                <tr key={p.id} className="border-b border-ink-100 last:border-0 hover:bg-ink-50/70 transition-colors">
                  <td className="px-5 py-3">
                    <div className="flex items-center gap-2.5 cursor-pointer" onClick={()=>st && onSelectStudent(st.id)}>
                      <Avatar name={st ? st.name : '?'} size={26} />
                      <span className="font-medium text-ink-800">{st ? st.name : 'Ученик удалён'}</span>
                    </div>
                  </td>
                  <td className="px-4 py-3 text-ink-500">{fmtDate(p.date)}</td>
                  <td className="px-4 py-3 text-ink-600">{p.method}</td>
                  <td className="px-4 py-3"><Badge tone={tone}>{p.status}</Badge></td>
                  <td className="px-5 py-3 text-right font-medium tabular-nums text-ink-800">{fmtMoney(p.amount)}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

        </label>
        <label className="block"><span className="block text-xs text-ink-500 mb-1">Тип</span>
          <select value={type} onChange={e=>setType(e.target.value as any)} className="w-full text-sm rounded-lg border border-ink-200 px-2.5 py-1.5">
            <option>Индивидуальное</option><option>Пробное</option><option>Групповое</option>

          className="text-sm px-3 py-1.5 rounded-lg bg-violet-600 text-white hover:bg-violet-700">Сохранить</button>
      </div>
    </div>
  );
}

function StudentModal({ mode, student, onClose, onSave }: any) {
  const isNew = mode === 'add';
  const [form, setForm] = useState<Student>(() => student ? { ...student } : {
    id: uid(), name: '', phone: '', email: '',
    voiceType: 'Сопрано', rangeLow: 'C4', rangeHigh: 'A5',
    level: 'Начинающий', stage: 'trial', genres: [],
    pricePerLesson: 2500, balance: 0, goals: '', notes: '',
    joinedDate: new Date().toISOString(),
  });

  function set<K extends keyof Student>(key: K, value: Student[K]) {
    setForm(f => ({ ...f, [key]: value }));
  }
  function applyTypicalRange(vt: VoiceType) {
    const [lo, hi] = VOICE_TYPICAL_RANGE[vt];
    setForm(f => ({ ...f, voiceType: vt, rangeLow: lo, rangeHigh: hi }));
  }
  function toggleGenre(g: string) {
    setForm(f => ({ ...f, genres: f.genres.includes(g) ? f.genres.filter(x=>x!==g) : [...f.genres, g] }));
  }

  const valid = form.name.trim().length > 1 && noteIndex(form.rangeHigh) >= noteIndex(form.rangeLow);

  return (
    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4">
      <div className="absolute inset-0 bg-ink-900/35 anim-fade" onClick={onClose} />
      <div className="relative w-[560px] max-w-full max-h-[90vh] bg-white rounded-xl2 shadow-pop anim-pop flex flex-col">
        <div className="flex items-center justify-between px-6 py-4 border-b border-ink-100">
          <h2 className="text-base font-semibold text-ink-900">{isNew ? 'Новый ученик' : 'Редактирование ученика'}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-lg hover:bg-ink-100 flex items-center justify-center text-ink-500"><IconX className="w-4 h-4"/></button>
        </div>

        <div className="flex-1 overflow-y-auto px-6 py-5 space-y-5">
          <div className="grid grid-cols-2 gap-3.5">
            <label className="block col-span-2"><span className="block text-xs font-medium text-ink-500 mb-1.5">Имя и фамилия</span>
              <input value={form.name} onChange={e=>set('name', e.target.value)} placeholder="Например: Мария Соколова"
                className="w-full rounded-lg border border-ink-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-violet-400"/>
            </label>
            <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Телефон</span>
              <input value={form.phone} onChange={e=>set('phone', e.target.value)} placeholder="+7 900 000-00-00"
                className="w-full rounded-lg border border-ink-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-violet-400"/>
            </label>
            <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Email</span>
              <input value={form.email} onChange={e=>set('email', e.target.value)} placeholder="mail@example.com"
                className="w-full rounded-lg border border-ink-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 focus:border-violet-400"/>
            </label>
          </div>

          <div className="grid grid-cols-2 gap-3.5">
            <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Тип голоса</span>
              <select value={form.voiceType} onChange={e=>applyTypicalRange(e.target.value as VoiceType)}
                className="w-full rounded-lg border border-ink-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
                {VOICE_TYPES.map(v => <option key={v}>{v}</option>)}
              </select>
            </label>
            <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Уровень подготовки</span>
              <select value={form.level} onChange={e=>set('level', e.target.value as any)}
                className="w-full rounded-lg border border-ink-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
                {LEVELS.map(l => <option key={l}>{l}</option>)}
              </select>
            </label>
          </div>

          <div>
            <div className="flex items-center justify-between mb-1.5">
              <span className="text-xs font-medium text-ink-500">Вокальный диапазон</span>
              <span className="text-xs text-ink-400">{rangeSemitones(form.rangeLow, form.rangeHigh)} полутонов</span>
            </div>
            <div className="flex gap-3 mb-2.5">
              <NoteSelect label="Нижняя нота" value={form.rangeLow} onChange={v=>set('rangeLow', v)} />
              <NoteSelect label="Верхняя нота" value={form.rangeHigh} onChange={v=>set('rangeHigh', v)} />
            </div>
            <VoiceRangeKeyboard low={form.rangeLow} high={form.rangeHigh} />
            {noteIndex(form.rangeHigh) < noteIndex(form.rangeLow) && (
              <p className="text-xs text-rose-500 mt-1.5">Верхняя нота должна быть выше нижней</p>
            )}
          </div>

          <div>
            <span className="block text-xs font-medium text-ink-500 mb-1.5">Жанры</span>
            <div className="flex flex-wrap gap-1.5">
              {GENRES.map(g => {
                const on = form.genres.includes(g);
                return (
                  <button key={g} type="button" onClick={()=>toggleGenre(g)}
                    className={`text-xs font-medium px-2.5 py-1.5 rounded-lg border transition-colors ${on ? 'bg-violet-600 border-violet-600 text-white' : 'border-ink-200 text-ink-600 hover:bg-ink-50'}`}>
                    {g}
                  </button>
                );
              })}
            </div>
          </div>

          <div className="grid grid-cols-2 gap-3.5">
            <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Стоимость занятия (₽)</span>
              <input type="number" value={form.pricePerLesson} onChange={e=>set('pricePerLesson', +e.target.value)}
                className="w-full rounded-lg border border-ink-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400"/>
            </label>
            <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Этап</span>
              <select value={form.stage} onChange={e=>set('stage', e.target.value as Stage)}
                className="w-full rounded-lg border border-ink-200 bg-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400">
                {STAGES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
              </select>
            </label>
          </div>

          <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Цели ученика</span>
            <textarea value={form.goals} onChange={e=>set('goals', e.target.value)} rows={2} placeholder="Например: подготовка к конкурсу, расширение диапазона..."
              className="w-full rounded-lg border border-ink-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 resize-none"/>
          </label>
          <label className="block"><span className="block text-xs font-medium text-ink-500 mb-1.5">Заметки педагога</span>
            <textarea value={form.notes} onChange={e=>set('notes', e.target.value)} rows={2} placeholder="Особенности голоса, зажимы, прогресс..."
              className="w-full rounded-lg border border-ink-200 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-violet-400 resize-none"/>
          </label>
        </div>

        <div className="flex items-center justify-end gap-2 px-6 py-4 border-t border-ink-100">
          <button onClick={onClose} className="text-sm font-medium px-4 py-2 rounded-lg text-ink-600 hover:bg-ink-100">Отмена</button>
          <button disabled={!valid} onClick={()=>onSave(form, isNew)}
            className="text-sm font-medium px-4 py-2 rounded-lg bg-violet-600 text-white hover:bg-violet-700 disabled:opacity-40 disabled:cursor-not-allowed">
            {isNew ? 'Добавить ученика' : 'Сохранить изменения'}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================================
   MOUNT
============================================================================ */

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
