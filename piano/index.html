body{ font-family:'Inter',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif; color:#15141c; -webkit-font-smoothing:antialiased; }
::-webkit-scrollbar{ width:8px; height:8px; }
::-webkit-scrollbar-track{ background:transparent; }
::-webkit-scrollbar-thumb{ background:#dcd7e6; border-radius:8px; }
::-webkit-scrollbar-thumb:hover{ background:#c2bccb; }
.no-scrollbar::-webkit-scrollbar{ display:none; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(4px)} to{opacity:1; transform:translateY(0)} }
@keyframes slideIn{ from{opacity:0; transform:translateX(16px)} to{opacity:1; transform:translateX(0)} }

.anim-fade{ animation: fadeIn .28s ease both; }
.anim-slide{ animation: slideIn .26s cubic-bezier(.2,.8,.2,1) both; }
.anim-pop{ animation: popIn .18s cubic-bezier(.2,.8,.2,1) both; }
.tabular-nums{ font-variant-numeric: tabular-nums; }

.px-0{padding-left:0;padding-right:0}
.duration-200{transition-duration:.2s}
.ease-in-out{transition-timing-function:cubic-bezier(.4,0,.2,1)}

const SEMITONES = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];
const SOLFEGE = {

function noteIndex(note) {

  const [, s, oct] = m;
  return parseInt(oct, 10) * 12 + SEMITONES.indexOf(s);
}

}
